<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="header">
            <span class="status-label">Saldo totale</span>
            <h1 id="balance">€ 0.00</h1>
            <div class="show-hide">
                <i class="fa-regular fa-eye"></i> Mostra saldo
            </div>
        </header>

        <main class="content">
            <div class="cyber-card">
                <div class="card-glow-cyan"></div>
                <div class="card-glow-purple"></div>
                
                <div class="card-top">
                    <div class="chip"></div>
                    <i class="fa-solid fa-bolt-lightning neon-icon"></i>
                </div>
                
                <div class="card-mid">
                    <span class="card-number">4536 4777 7110 1055</span>
                </div>
                
                <div class="card-bottom">
                    <div class="holder-info">
                        <span class="label">TITOLARE</span>
                        <span class="name">LEONARDO SORU</span>
                    </div>
                    <div class="expiry-info">
                        <span class="label">SCADENZA</span>
                        <span class="date">06/50</span>
                    </div>
                </div>
            </div>

            <div class="action-grid">
                <button class="action-btn cyan" id="btn-boost">
                    <div class="icon-wrapper"><i class="fa-solid fa-plus"></i></div>
                    <span>Boost</span>
                </button>
                <button class="action-btn purple" id="btn-deduct">
                    <div class="icon-wrapper"><i class="fa-solid fa-minus"></i></div>
                    <span>Deduct</span>
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-chart-simple"></i><span>Stats</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-user-gear"></i><span>Menu</span></a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
